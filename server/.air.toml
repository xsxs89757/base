root = "."
tmp_dir = "tmp"

[build]
  entrypoint = "./tmp/server"
  # CGO_LDFLAGS=-w 抑制 macOS ld 链接器在 SDK 版本与 linker 版本不匹配时
  # 反复输出的 "object file ... was built for newer 'macOS' version" 警告。
  # 该警告不影响二进制功能，仅噪声，根治需对齐 Xcode CLT 与 Go 工具链。
  cmd = "CGO_LDFLAGS=-w go build -o ./tmp/server ."
  delay = 1000
  exclude_dir = ["tmp", "docs", "vendor"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "yaml"]
  kill_delay = "0s"
  send_interrupt = true
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = true

[misc]
  clean_on_exit = true
